<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Procurement Dashboard</title>
    </head>
<body>

    <div class="dashboard-container">
        <h1>PM DASHBOARD</h1>
        <button class="refresh-btn" onclick="fetchLivePRs()">↻ Refresh</button>
        
        <table id="pr-table">
            <thead>
                <tr>
                    <th>PR #</th>
                    <th>Requester</th>
                    <th>Department</th>
                    <th>Total (SAR)</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="pr-body">
                </tbody>
        </table>
    </div>

    <script>
        // Use the exact production URL
        const N8N_PROD_URL = "https://n8n.srv1106977.hstgr.cloud/webhook-test/get-prs";

        async function fetchLivePRs() {
            const refreshBtn = document.querySelector('.refresh-btn');
            const tableBody = document.getElementById('pr-body');
            
            try {
                refreshBtn.textContent = "⏳ Loading...";
                
                const response = await fetch(N8N_PROD_URL, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });

                if (!response.ok) throw new Error(`Server Error: ${response.status}`);

                const data = await response.json();
                
                // Clear existing rows
                tableBody.innerHTML = "";

                // Populate table
                if (Array.isArray(data)) {
                    data.forEach(pr => {
                        const row = `<tr>
                            <td>${pr.PR_Number || 'N/A'}</td>
                            <td>${pr.Requester_Name || 'N/A'}</td>
                            <td>${pr.Department || 'N/A'}</td>
                            <td>${pr.Total || 0}</td>
                            <td>${pr.Status || 'Pending'}</td>
                        </tr>`;
                        tableBody.innerHTML += row;
                    });
                }
            } catch (error) {
                console.error("Dashboard engine failed:", error);
                alert("Failed to load data. Ensure n8n is Active and CORS is enabled.");
            } finally {
                refreshBtn.textContent = "↻ Refresh";
            }
        }

        // Auto-fetch on load
        window.onload = fetchLivePRs;
    </script>
</body>
</html>
